services:
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs_local_app
    volumes:
      - ./:/app
      - nextjs_data:/app/.next
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: always

volumes:
  nextjs_data:
    driver: local
